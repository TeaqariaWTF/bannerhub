name: Build APK (Amazon branch — artifact only, no release)

on:
  push:
    branches:
      - amazon-integration

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download original APK
        run: |
          gh release download base-apk --pattern "*.apk" -D base/ -R ${{ github.repository }}
          ls base/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install apktool
        run: |
          APKTOOL_VER=2.9.3
          mkdir -p $HOME/bin
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VER}/apktool_${APKTOOL_VER}.jar" -O $HOME/bin/apktool.jar
          wget -q "https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool" -O $HOME/bin/apktool
          chmod +x $HOME/bin/apktool
          echo "$HOME/bin" >> $GITHUB_PATH
          java -jar $HOME/bin/apktool.jar --version

      - name: Decompile APK
        run: |
          APK=$(ls base/*.apk | head -1)
          echo "Decompiling: $APK"
          java -jar $HOME/bin/apktool.jar d "$APK" -o apktool_out --force

      - name: Remove uncompilable apktool artifacts
        run: |
          rm -f apktool_out/res/raw/raws.xml
          python3 - << 'PYEOF'
          import re, os
          path = "apktool_out/res/values/public.xml"
          with open(path) as f:
              content = f.read()
          content = re.sub(r'\s*<public[^>]*name="firebase_common_keep"[^>]*/>', '', content)
          content = re.sub(r'\s*<public[^>]*name="firebase_crashlytics_keep"[^>]*/>', '', content)
          with open(path, "w") as f:
              f.write(content)
          PYEOF

      - name: Apply patches
        run: |
          # Remove classes12 smali (over dex index limit — re-inject original after rebuild)
          rm -rf apktool_out/smali_classes12

          # Extract original classes12.dex from base APK for re-injection
          cd base && unzip -o "$(ls *.apk | head -1)" classes12.dex && cd ..

          # Copy all patch smali files
          for dir in patches/smali*/; do
            target="apktool_out/${dir#patches/}"
            mkdir -p "$target"
            cp -r "$dir"* "$target"
          done

          # Copy patched resource/manifest files
          for f in patches/res patches/AndroidManifest.xml patches/apktool.yml; do
            [ -e "$f" ] && cp -r "$f" apktool_out/
          done

      - name: Apply Grant Root Access smali patches
        run: |
          python3 patches/apply_root_patches.py apktool_out || true

      - name: Patch package name (amazon branch — isolated from stable)
        run: |
          sed -i "s/gamehub\.lite/banner.hub/g" apktool_out/AndroidManifest.xml

      - name: Rebuild and Sign
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "Building Amazon-integration build @ ${SHORT_SHA}..."

          # Rebuild
          java -jar $HOME/bin/apktool.jar b apktool_out -o rebuilt-unsigned.apk

          # Inject original classes12.dex
          zip rebuilt-unsigned.apk classes12.dex

          # Compile and inject extension dex as classes18.dex
          ANDROID_JAR=$(ls $ANDROID_SDK_ROOT/platforms/android-*/android.jar 2>/dev/null | sort -V | tail -1)
          mkdir -p ext_classes
          javac -source 8 -target 8 -cp "$ANDROID_JAR" -d ext_classes extension/*.java
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          mkdir -p ext_dex
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/d8 --release --min-api 26 --output ext_dex $(find ext_classes -name "*.class")
          cp ext_dex/classes.dex classes18.dex
          zip -j rebuilt-unsigned.apk classes18.dex

          # Align
          ${ANDROID_SDK_ROOT}/build-tools/$(ls ${ANDROID_SDK_ROOT}/build-tools | tail -1)/zipalign -f -v 4 rebuilt-unsigned.apk rebuilt-aligned.apk

          # Sign
          APK_NAME="BannerHub-amazon-${SHORT_SHA}.apk"
          ${ANDROID_SDK_ROOT}/build-tools/$(ls ${ANDROID_SDK_ROOT}/build-tools | tail -1)/apksigner sign \
            --key testkey.pk8 \
            --cert testkey.x509.pem \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out "$APK_NAME" \
            rebuilt-aligned.apk

          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV
          echo "Done: $APK_NAME ($(du -sh "$APK_NAME" | cut -f1))"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: BannerHub-amazon-${{ github.sha }}
          path: ${{ env.APK_NAME }}
          retention-days: 30
